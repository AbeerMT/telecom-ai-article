ions","Human authority boundary","Decision classification","Documented criteria"]},{code:"S.2",title:"AI-Native vs AI-Assisted",desc:"Which functions are rebuilt around agents vs those where humans still own the work and agents accelerate it? Each function must be explicitly classified as AI-native or AI-assisted, with defined implications for ownership, accountability, and control models.",tags:["AI-native functions","AI-assisted functions","Ownership implications","Control model","Governance consequences"]},{code:"S.3",title:"Strategic Priorities Alignment",desc:"Which existing strategic priorities does this accelerate — and how is that measured in board-visible terms? Strategic alignment must be evidenced through measurable impact against defined baselines, using board-visible metrics tied to decision quality, speed, and cost.",tags:["Board-visible metrics","Defined baselines","Decision quality","Decision speed","Cost impact","Org strategy integration"]},{code:"S.4",title:"Executive Override Authority",desc:"What is the organisation's executive override authority — and when does it trigger? Override authority must have clearly defined trigger conditions — e.g. risk threshold breach, unintended decision impact, or system behaviour outside defined scope.",tags:["Override authority","Trigger conditions","Risk threshold breach","Kill-switch","Accountability boundaries"]}]},{code:"01",label:"Domain 1 · Readiness",subtitle:"What must be true before you deploy anything",color:"#0d9488",bg:"#f0fdf9",border:"#0d9488",tagBg:"#ccfbf1",tagFg:"#134e4a",intro:"Most firms rush to deploy. This domain enforces honest self-assessment before any agent touches production. Readiness is not a checklist — it is a precondition for responsible deployment. Must result in a defined implementation path (buy, build, hybrid) with constraints documented. Sequencing matters: Domain 1 must precede Domain 2, which must precede Domain 3. Minimum viable governance posture requires pillars 1.1, 2.1, 2.4, and 4.1 before any agent touches production.",pillars:[{code:"1.1",title:"Capability Assessment",desc:"Honest audit of internal skills, data maturity, integration complexity, and budget. Determines which implementation path is realistic — not which one is aspirational.",tags:["Skills audit","Data maturity","Integration complexity","Budget realism"]},{code:"1.2",title:"Deployment Maturity — Crawl, Walk, Run",desc:"Low-risk tasks under full human review first. Success gates before progression. Autonomy is earned, not granted.",phases:[{l:"Crawl",d:"Low-risk tasks, full human review on all outputs",bg:"#d1fae5",c:"#065f46"},{l:"Walk",d:"Medium-risk operational work, human-on-the-loop oversight",bg:"#dbeafe",c:"#1e40af"},{l:"Run",d:"Proven use cases with defined blast radius and circuit breakers",bg:"#ede9fe",c:"#4c1d95"}],tags:["Success gates","Risk-based progression","Autonomy earned not granted"]},{code:"1.3",title:"Change & Culture Readiness",desc:"The programme fails or succeeds on whether people change how they work. Map resistance patterns. Shift people from operators of AI to governors of AI — curators of judgment, not just users of tools.",blocks:[{title:"Resistance mapping",desc:"Identify resistance patterns early; address staff whose expertise is being codified by agents",bg:"#d1fae5",tc:"#065f46"},{title:"Skill shift",desc:"Move people from AI operators to AI governors — curators of judgment, not users of tools",bg:"#ccfbf1",tc:"#0f766e"},{title:"Cultural readiness",desc:"Build a continuous learning culture where AI is embedded in daily work, not bolted on the side",bg:"#e1f5ee",tc:"#085041"}],tags:["AI champions network","Role-based training","Adoption tracking","RACI per domain"]},{code:"1.4",title:"Procurement & Third-Party Agent Governance",desc:"Most enterprises will buy agents before they build them. Vendor agent due diligence, model provenance, SBOM-equivalent for agent stacks, contractual rights to audit and withdraw. An agent SBOM must capture model version, training data provenance, fine-tuning history, system prompt version, tool registry, and dependency graph.",tags:["Vendor due diligence","Model provenance","Agent SBOM","Model version","Training data provenance","System prompt version","Tool registry","Dependency graph","Audit & withdrawal rights"]},{code:"1.5",title:"Governance Operating Model",desc:"A governance framework without a function to operate it is a policy document. Define where AI governance sits in the organisation — Risk, Technology, CDO office, or standalone Centre of Excellence. Define its budget authority, reporting line, and decision rights. The governance function must have named leadership, a funded operating budget, defined interfaces with Legal, Risk, Technology, and the business, and a board-visible reporting cadence. Governance that lives as a side-of-desk activity for the CTO will fail.",blocks:[{title:"Organisational placement",desc:"Where does AI governance sit — Risk, CDO office, Technology, or Centre of Excellence? Reporting line must reach board level.",bg:"#d1fae5",tc:"#065f46"},{title:"Budget & decision authority",desc:"Funded operating budget with defined decision rights. Governance without budget authority cannot enforce.",bg:"#ccfbf1",tc:"#0f766e"},{title:"Stakeholder interfaces",desc:"Defined interfaces with Legal, Risk, Technology, HR, and the business. Each domain has a named governance liaison.",bg:"#e1f5ee",tc:"#085041"}],tags:["Named governance leadership","Funded operating budget","Board reporting cadence","CDO / CRO interface","Centre of Excellence","Decision rights","Governance liaison per domain"]}]},{code:"02",label:"Domain 2 · Control",subtitle:"Who is accountable, and how decisions are made visible",color:"#4f46e5",bg:"#eef2ff",border:"#4f46e5",tagBg:"#e0e7ff",tagFg:"#312e81",intro:"Control answers the hardest question in AI governance: when something goes wrong, who owns it? This domain establishes the accountability chain, decision transparency, and human oversight modes that make agentic AI auditable.",pillars:[{code:"2.1",title:"Named Accountability",desc:"Every agentic system has a named human owner accountable for its operation, outcomes, and shutdown authority. Accountability chains across agent, domain, and enterprise levels — with clear escalation paths when thresholds are exceeded. No anonymous ownership. No committees-as-owners.",tags:["Named system owners","Accountability chain","Shutdown authority","No anonymous ownership"]},{code:"2.2",title:"Decision Transparency",desc:"The reasoning behind every agent decision — inputs, logic, rules applied — must be interpretable and challengeable by a human. Explainability is not optional for material decisions.",blocks:[{title:"Covers: the reasoning",desc:"Inputs, logic, rules applied behind every material decision",bg:"#eeedfe",tc:"#3c3489"},{title:"Not this: the actor",desc:"Who performed the action — that belongs in pillar 2.3",bg:"#e1f5ee",tc:"#085041"}],tags:["Interpretable decisions","Challengeable by humans","Material decision explainability"]},{code:"2.3",title:"Agent Identity & Traceability",desc:"Every agent has a verifiable cryptographic identity. Every action is logged, timestamped, and attributable. Cross-agent audit trail when agents hand off tasks to each other.",tags:["Cryptographic identity","Timestamped action logs","Cross-agent audit trail","Task handoff traceability"]},{code:"2.4",title:"Human Oversight Modes",desc:"Not one mode — three, applied by risk tier. The choice of oversight mode is itself a governed decision.",blocks:[{title:"Human-in-the-loop",desc:"Human approves each action. High-stakes, irreversible, or customer-facing decisions.",bg:"#fee2e2",tc:"#7f1d1d"},{title:"Human-on-the-loop",desc:"Human monitors and can intervene. Medium-risk operational work.",bg:"#fef3c7",tc:"#78350f"},{title:"Human-in-command",desc:"Human sets policy and audits post-hoc. Low-risk, high-volume, reversible tasks.",bg:"#dcfce7",tc:"#14532d"}],tags:["Risk-tiered oversight","Oversight mode governance"]},{code:"2.5",title:"Prompt Governance",desc:"System prompts are the primary control surface for agent behaviour — defining scope, persona, tool access, output format, and refusal behaviour. Prompt governance is as critical as code governance. Every system prompt must be versioned, access-controlled, tested before deployment, and reviewed on a defined cadence. Prompt changes must follow a change management process equivalent to production code changes.",blocks:[{title:"Prompt versioning",desc:"Every system prompt versioned with change history, author, review date, and deployment record",bg:"#eef2ff",tc:"#312e81"},{title:"Prompt access control",desc:"System prompts are privileged artefacts — write access restricted, read access logged, no runtime modification without authorisation",bg:"#eef2ff",tc:"#312e81"},{title:"Prompt testing & change management",desc:"Prompts tested against defined test cases before deployment. Changes follow production-equivalent change management process.",bg:"#eef2ff",tc:"#312e81"}],tags:["Prompt versioning","Prompt access control","Prompt change management","System prompt testing","Scope & refusal behaviour","Persona governance","Production-equivalent process"]},{code:"2.6",title:"Escalation & Intervention Model",desc:"Accountability must activate under pressure. If escalation is undefined, accountability fails at the moment it is needed most.",blocks:[{title:"Escalation triggers",desc:"Blast radius exceeded, cost anomaly, confidence breach, ethical threshold hit",bg:"#fee2e2",tc:"#7f1d1d"},{title:"Escalation path",desc:"Agent owner → domain owner → enterprise authority",bg:"#fef3c7",tc:"#78350f"},{title:"Intervention actions",desc:"Pause, rollback, shutdown, human override — predefined before deployment",bg:"#dcfce7",tc:"#14532d"}],tags:["Escalation triggers","Intervention playbook","Override authority"]}]},{code:"03",label:"Domain 3 · Agentic-Native Controls",subtitle:"The problems single-agent governance cannot solve",color:"#7c3aed",bg:"#f5f3ff",border:"#7c3aed",tagBg:"#ede9fe",tagFg:"#4c1d95",intro:"This is where most frameworks are silent. Agentic AI introduces governance problems that did not exist in predictive or generative AI, and they cannot be retrofitted into traditional controls. Strong on control design — needs runtime enforcement, identity, and observability to be enterprise-ready.",pillars:[{code:"3.1",title:"Multi-Agent Orchestration",desc:"When agents invoke other agents, delegate tasks, and negotiate — governance shifts from 'is this agent safe' to 'is this system of agents safe.' Rules of engagement between agents. Task delegation boundaries. Emergent behaviour detection. Cascade failure containment. Agents must validate the authority, intent, and scope of other agents before accepting delegated tasks.",tags:["Agent rules of engagement","Delegation boundaries","Inter-agent trust model","Authority validation","Emergent behaviour detection","Cascade failure containment"]},{code:"3.2",title:"Action Blast-Radius Governance & Policy Enforcement",desc:"Agents execute — they send emails, move funds, deploy code, book resources. Every tool an agent can invoke must have a defined blast radius: maximum damage if misused, reversibility window, escalation trigger above a threshold. Controls must be enforced at runtime via platform-level guardrails, not left to agent design. Blast radius thresholds directly link to escalation authority.",tags:["Blast radius per tool","Reversibility window","Runtime policy enforcement","Platform-level guardrails","Tiered tool authorisation","Escalation threshold"]},{code:"3.3",title:"Memory & Context Governance",desc:"Agents accumulate memory across sessions. Who decides what gets persisted? How is poisoned or manipulated memory detected and purged? What is the retention policy and right-to-forget mechanism for customer data held in agent memory? All persisted memory must be traceable to verified sources with controls to prevent unverified or external data contamination.",tags:["Memory persistence policy","Verified source traceability","Poisoned memory detection","Data contamination controls","Retention & purge policy","Right to forget"]},{code:"3.4",title:"Agent Identity, Access & Runtime Observability",desc:"Each agent must operate under a defined identity with scoped permissions and least-privilege access to tools and data. All agent actions, delegations, and tool invocations must be observable in real time with alerting on abnormal behaviour. Resource governance enforces hard limits on spend, compute, and API calls per agent with circuit breakers. Budget ownership sits at agent level, not platform level.",blocks:[{title:"Identity & Access Model",desc:"Defined agent identity, scoped permissions, least-privilege access to tools and data",bg:"#ede9fe",tc:"#4c1d95"},{title:"Runtime Observability",desc:"All actions, delegations, and tool invocations observable in real time with alerting on abnormal behaviour",bg:"#ede9fe",tc:"#4c1d95"},{title:"Resource & Cost Controls",desc:"Hard spend limits, compute caps, API call limits per agent. Circuit breakers. Budget ownership at agent level, not platform level",bg:"#ede9fe",tc:"#4c1d95"}],tags:["Defined agent identity","Least-privilege access","Real-time observability","Abnormal behaviour alerting","Hard spend limits","Circuit breakers","Per-agent budget ownership"]},{code:"3.5",title:"Agent Lifecycle Management & Testing",desc:"Version control, deprecation, rollback. When an agent is retired — what happens to its memory, its pending tasks, its downstream dependencies? Most firms cannot answer this today. Lifecycle stages must have defined ownership for promotion, rollback, and retirement decisions. Multi-agent systems must be stress-tested under adversarial and failure scenarios before production deployment.",tags:["Version control","Deprecation policy","Rollback capability","Defined ownership per stage","Adversarial stress-testing","Failure scenario simulation","Dependency mapping"]}]},{code:"04",label:"Domain 4 · Trust",subtitle:"Making the outputs defensible",color:"#dc2626",bg:"#fff1f2",border:"#dc2626",tagBg:"#fee2e2",tagFg:"#7f1d1d",intro:"Trust is earned through demonstrable controls on security, data, and output quality. Each pillar here answers a different question about defensibility — to regulators, customers, and the board.",pillars:[{code:"4.1",title:"Security & Risk Management",desc:"Treat agents as enterprise assets with defined threat models. Apply the five NIST security disciplines to a new asset class. An incident taxonomy must define reportable events — including: a hallucination that influenced a material decision, an agent exceeding its blast radius, a memory poisoning event, an inter-agent delegation that violated scope, a prompt injection attack, or a resource runaway. Without a taxonomy, every team classifies differently and the audit trail becomes inconsistent.",nist:[{l:"Identify risks & assets",bg:"#e6f1fb",tc:"#0c447c"},{l:"Protect access & data",bg:"#eaf3de",tc:"#27500a"},{l:"Detect anomalies & threats",bg:"#faeeda",tc:"#633806"},{l:"Respond & contain",bg:"#fcebeb",tc:"#791f1f"},{l:"Recover & improve",bg:"#e1f5ee",tc:"#085041"}],tags:["Threat modelling","Least privilege","Agent misuse controls","Incident taxonomy","Hallucination-influenced decision","Blast radius breach","Memory poisoning","Prompt injection","Scope violation","Resource runaway","Incident response","Business continuity"]},{code:"4.2",title:"Data Privacy & Governance",desc:"Agents access only the data they need. All outputs traceable to source data. Human approval for sensitive or customer-facing content. Privacy-by-design at the prompt and retrieval layer — not bolted on after.",tags:["Data minimisation","Privacy-by-design","Output traceability","Prompt layer privacy","Data classification & access policy","Prompt injection protection","Secrets & credential management","Runtime policy enforcement"]},{code:"4.3",title:"Output Integrity — Bias, Fairness & Hallucination",desc:"Actively govern quality, honesty, and fairness. Test for bias against defined fairness thresholds. Ground outputs in verified sources. Red-team adversarially before deployment and on a cadence after.",blocks:[{title:"Bias detection & fairness testing",desc:"Test against defined fairness thresholds before and after deployment",bg:"#eeedfe",tc:"#3c3489"},{title:"Hallucination detection & grounding",desc:"Ground outputs in verified sources; flag low-confidence results for review",bg:"#faeeda",tc:"#633806"},{title:"Output safeguards & guardrails",desc:"Constrain agent scope; structured workflows reduce error risk",bg:"#fcebeb",tc:"#791f1f"},{title:"Red-teaming & adversarial testing",desc:"Adversarial scenarios before production and on a recurring cadence after",bg:"#e1f5ee",tc:"#085041"},{title:"Output enforcement & blocking",desc:"Block or escalate outputs that fail validation or fall below confidence thresholds before use.",bg:"#fef3c7",tc:"#78350f"}],tags:["Fairness thresholds","RAG & source grounding","Output validation","Confidence scoring","Output blocking rules","Human escalation triggers","Validation failure handling"],note:"Source: Mitigation Strategies for Errors in Agentic AI Systems"}]},{code:"05",label:"Domain 5 · Assurance",subtitle:"Proving it works, continuously",color:"#0284c7",bg:"#f0f9ff",border:"#0284c7",tagBg:"#e0f2fe",tagFg:"#0c4a6e",intro:"Assurance is not a one-time audit. It is a continuous discipline. Monitoring is the primary trigger mechanism for accountability — metrics must be explicitly tied to escalation thresholds and responsible owners.",pillars:[{code:"5.1",title:"Reliability & Bounded Behaviour",desc:"Agents behave consistently within defined boundaries — don't drift beyond scope, don't degrade silently, produce reproducible results where required. Behaviour must be explicitly controlled as deterministic or probabilistic depending on use case, with defined limits on model variability. Boundaries must be enforced at runtime through guardrails (tool restrictions, policy checks, workflow constraints), not only defined in design. Fallback mechanisms must include retry logic, alternative execution paths, and human escalation where required.",tags:["Consistent outputs","Defined agent boundaries","Deterministic vs probabilistic","Runtime guardrails","Tool restrictions","Policy checks","Retry logic","Alternative execution paths","Human escalation fallback","No silent drift"]},{code:"5.2",title:"Sandbox Testing",desc:"Edge cases, failure modes, and adversarial scenarios tested in controlled environments before production. Not a one-time gate — a continuous discipline as models and prompts evolve. Testing must meet defined coverage thresholds across edge cases, adversarial scenarios, and known failure modes before production deployment. Deployment must be gated — agents cannot be promoted unless they meet predefined performance, reliability, and risk criteria.",tags:["Edge case testing","Failure mode analysis","Adversarial scenarios","Coverage thresholds","Gated deployment","Performance criteria","Reliability criteria","Risk criteria","Continuous not once-off"]},{code:"5.3",title:"KPI & Continuous Monitoring",desc:"Real-time tracking of accuracy, hallucination rate, adoption, drift, cost per decision, and risk indicators. Dashboards that surface degradation before users report it. Monitoring is the primary trigger for accountability escalation. Monitoring must trigger action — including rollback, throttling, or human intervention — when defined thresholds are breached. All metrics must be tied to versioned models, prompts, and workflows to enable precise identification of performance degradation. Service-level objectives (SLOs) must be defined for latency, accuracy, and availability aligned to business impact.",tags:["Accuracy rate","Hallucination rate","Cost per decision","Drift detection","Rollback trigger","Throttling trigger","Versioned model metrics","Prompt-level tracking","SLO: latency","SLO: accuracy","SLO: availability","Escalation-linked metrics"]},{code:"5.4",title:"Regulatory Compliance",desc:"Classify each agent by risk tier using a formal instrument — applying likelihood-consequence criteria across four tiers: prohibited, high-risk, limited-risk, and minimal-risk — with documented rationale per agent. Document controls against applicable obligations. Maintain audit trail sufficient to demonstrate due care. EU AI Act, ISO 42001, and NIST AI RMF are reference standards these actions satisfy — not substitutes for the actions themselves. Regulatory obligations must be mapped to specific controls, test cases, and audit evidence within the system. Compliance must be demonstrable through traceable logs, validation records, and documented control execution — not policy statements alone.",tags:["Risk-tiered classification","Formal risk instrument","Likelihood-consequence criteria","Prohibited / High / Limited / Minimal","Obligation-to-control mapping","Test case evidence","Traceable logs","Validation records","Documented control execution","Audit trail","EU AI Act","ISO 42001","NIST AI RMF"]}]},{code:"06",label:"Domain 6 · Value Realisation",subtitle:"Governance-as-strategy, not governance-as-control",color:"#16a34a",bg:"#f0fdf4",border:"#16a34a",tagBg:"#dcfce7",tagFg:"#14532d",intro:"If AI does not change decision quality, speed, or cost — it is not transformation. It is expensive software with a governance overhead. Governance teams that cannot report value realisation become cost centres. Those that can become strategic advisors to the CEO. Value realisation requires rigorous baseline definition, clear attribution, named ownership, defined time horizons, full cost accounting, portfolio aggregation, and kill criteria for underperforming agents.",pillars:[{code:"6.1",title:"Decision Economics",desc:"Cost of wrong decisions before versus after AI. Time-to-decision reduction. Decision quality improvement over time. Each agent must demonstrate measurable impact against defined baseline performance — including improvements in decision speed, accuracy, and cost efficiency. Baselines must be established using historical performance data or controlled benchmarks before AI deployment. Value must be attributable to agent intervention, isolating AI impact from other factors — using methods such as A/B holdout populations, difference-in-differences analysis, or synthetic control groups. If an agent does not consistently improve, it must be re-scoped, constrained, or retired.",tags:["Cost per decision","Time-to-decision","Decision quality score","Historical baseline","Controlled benchmarks","Attribution model","A/B holdout populations","Difference-in-differences","Synthetic control groups","AI impact isolation","Re-scope or retire"]},{code:"6.2",title:"Operational Value",desc:"Headcount required to scale. Manual effort eliminated. Revenue per automated decision. Margin impact of automation. These are the metrics boards care about — most governance frameworks never report them. Total cost of ownership must include model usage, infrastructure, integration, and governance overhead. Each value stream must have a named business owner accountable for delivering and reporting measurable outcomes.",tags:["Headcount efficiency","Manual effort eliminated","Revenue per decision","Margin impact","Total cost of ownership","Model & infrastructure cost","Governance overhead","Named value stream owner"]},{code:"6.3",title:"Transformation Progress",desc:"Percentage of functions AI-native versus AI-assisted. Rate of autonomy progression across Crawl-Walk-Run phases. Are we actually transforming, or are we running expensive pilots indefinitely? Value must be tracked across defined time horizons — short-term efficiency gains versus long-term transformation impact. Value must be aggregated at portfolio level to assess overall transformation impact and investment efficiency. Agents must have predefined performance thresholds below which they are automatically reviewed, constrained, or decommissioned. Accountability is evidenced through sustained, measurable outcomes — not ownership.",blocks:[{title:"Time horizons",desc:"Track short-term efficiency gains separately from long-term transformation impact — boards need both views",bg:"#dcfce7",tc:"#14532d"},{title:"Portfolio view",desc:"Aggregate value across all agents and functions to assess total transformation impact and investment efficiency",bg:"#dcfce7",tc:"#166534"},{title:"Kill criteria",desc:"Predefined performance thresholds below which agents are automatically reviewed, constrained, or decommissioned",bg:"#fee2e2",tc:"#7f1d1d"}],tags:["AI-native %","Autonomy progression rate","Short vs long-term horizons","Portfolio aggregation","Investment efficiency","Kill criteria","Performance thresholds","Pilot vs transformation"]}]}];function d(){let e=(0,i.useRef)(null);return(0,i.useEffect)(()=>{let t,n=e.current,r=n.getContext("2d"),a=()=>{n.width=window.innerWidth,n.height=Math.max(document.body.scrollHeight,window.innerHeight)};a(),window.addEventListener("resize",a);class l{constructor(){this.x=0,this.y=0,this.vx=0,this.vy=0,this.size=0,this.alpha=0,this.life=0,this.maxLife=0,this.hue="",this.wobble=0,this.wSpd=0,this.history=[],this.reset(!0)}reset(e=!1){this.x=Math.random()*n.width,this.y=e?Math.random()*n.height:n.height+30;let t=-Math.PI/2+(Math.random()-.5)*.5,r=.3+.6*Math.random();this.vx=Math.cos(t)*r,this.vy=Math.sin(t)*r,this.size=6+10*Math.random(),this.alpha=0,this.life=0,this.maxLife=220+200*Math.random();let a=Math.random();this.hue=a<.4?"37,99,235":a<.75?"59,130,246":"147,197,253",this.wobble=Math.random()*Math.PI*2,this.wSpd=.015+.02*Math.random(),this.history=[]}update(){this.wobble+=this.wSpd,this.vx+=.006*Math.cos(this.wobble),this.vy+=.005*Math.sin(.7*this.wobble);let e=Math.sqrt(this.vx*this.vx+this.vy*this.vy);e>.9&&(this.vx=this.vx/e*.9,this.vy=this.vy/e*.9),this.his
